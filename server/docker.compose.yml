services:
  postgres:
    image: postgres:17-alpine
    container_name: shababulkhair_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: shababulkhair
      POSTGRES_PASSWORD: shababulkhair12345
      POSTGRES_DB: shababulkhairdb
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5434:5432"
    volumes:
      - shababulkhair_postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: shababulkhair_redis_dev
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        REDIS_PASSWORD=$$(cat /run/secrets/redis_password)
        exec redis-server \
          --requirepass "$$REDIS_PASSWORD" \
          --appendonly yes \
          --appendfsync everysec \
          --maxmemory 256mb \
          --maxmemory-policy allkeys-lru \
          --save 900 1 \
          --save 300 10 \
          --save 60 10000
    ports:
      - "6579:6379"
    volumes:
      - shababulkhair_redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=$(cat /run/secrets/redis_password) redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    secrets:
      - redis_password

volumes:
  shababulkhair_postgres_data:
  shababulkhair_redis_data:

secrets:
  redis_password:
    file: ./secrets/redis_password.txt